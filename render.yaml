services:
  - type: web
    name: ai-platform-reliability-copilot-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python data/generate_synthetic_data.py
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: mock
      - key: PYTHON_VERSION
        value: 3.12.6
