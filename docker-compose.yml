services:
  backend:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base

  frontend:
    build: .
    command: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
